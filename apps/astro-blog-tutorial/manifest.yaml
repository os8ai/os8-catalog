# yaml-language-server: $schema=../../schema/appspec-v1.json

schemaVersion: 1
slug: astro-blog-tutorial
name: "Astro Blog Tutorial"
publisher: withastro
icon: ./icon.png
category: dev-tools
description: >-
  The completed example from Astro's official "Build a blog" tutorial.
  Static-site blog with Markdown posts, tags, and an RSS feed.
  Useful as a starter template inside OS8.

upstream:
  git: https://github.com/withastro/blog-tutorial-demo.git
  ref: 0859a3ea85f35325c0a292f9b3131824ef95ee38

framework: astro

runtime:
  kind: node
  version: "20"
  arch: [arm64, x86_64]
  package_manager: npm
  dependency_strategy: frozen

install:
  - argv: ["npm", "ci"]

start:
  argv: ["npm", "run", "dev", "--", "--port", "{{PORT}}", "--host", "127.0.0.1"]
  port: detect
  readiness:
    type: http
    path: /
    timeout_seconds: 60

surface:
  kind: web
  preview_name: "Astro Blog"
  base_path_strategy: flag

dev:
  hmr: vite
  editable: true

permissions:
  network:
    outbound: false
    inbound: false
  filesystem: app-private
  os8_capabilities: []
  secrets: []

resources:
  memory_limit_mb: 512
  gpu: none
  disk_mb: 300

legal:
  license: MIT
  commercial_use: unrestricted

review:
  channel: verified
  reviewed_at: "2026-04-28"
  reviewer: os8ai/curators
  risk: low
