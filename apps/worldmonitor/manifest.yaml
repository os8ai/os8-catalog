# yaml-language-server: $schema=../../schema/appspec-v1.json

schemaVersion: 1
slug: worldmonitor
name: "World Monitor"
publisher: koala73
icon: ./icon.png
screenshots:
  - ./screenshots/01-overview.png
category: intelligence
description: >-
  Real-time global intelligence dashboard. AI-powered news aggregation,
  geopolitical monitoring, and infrastructure tracking on an interactive
  3D globe.

upstream:
  git: https://github.com/koala73/worldmonitor.git
  ref: v2.5.23

framework: vite

runtime:
  kind: node
  version: "20"
  arch: [arm64, x86_64]
  package_manager: npm
  dependency_strategy: frozen

env:
  - name: VITE_DEV_PORT
    value: "5173"
    description: "Internal dev server port (proxy translates from {{PORT}})."

install:
  - argv: ["npm", "ci"]

start:
  # External apps live at <slug>.localhost:8888 via OS8's reverse proxy
  # (Phase 1 PR 1.14). Vite serves at base "/" inside that origin, so the
  # path-prefix --base flag isn't needed and would in fact misroute.
  # Verified end-to-end by Leo on 2026-05-01 via Developer Import.
  argv: ["npm", "run", "dev", "--", "--port", "{{PORT}}", "--host", "127.0.0.1"]
  port: detect
  readiness:
    type: http
    path: /
    timeout_seconds: 60

surface:
  kind: web
  preview_name: "World Monitor"

dev:
  hmr: vite
  editable: true
  restart_on:
    - vite.config.*
    - package.json

permissions:
  network:
    outbound: true
    inbound: false
  filesystem: app-private
  os8_capabilities: []
  secrets: []

resources:
  memory_limit_mb: 1024
  gpu: none
  disk_mb: 800

legal:
  license: AGPL-3.0-only
  commercial_use: restricted
  notes: "Personal use OK. Commercial use requires AGPL-3.0 compliance."

review:
  channel: verified
  reviewed_at: "2026-05-01"
  reviewer: os8ai/curators
  # Risk: medium (advisory). Wide dependency surface (~700 transitive
  # deps; includes Sentry, Convex, Tauri infra, deck.gl, ML tensors).
  # npm audit reports a handful of high-severity vulns in production
  # deps. Frontend behavior matches manifest (outbound network true).
  # End-to-end install + render verified on Linux/aarch64 2026-05-01;
  # see phase-3-plan.md §7 PR 3.5.1 for the smoke checklist.
  risk: medium
