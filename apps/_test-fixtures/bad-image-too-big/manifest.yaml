# Test fixture: icon exceeds 100 KB.
# yaml-language-server: $schema=../../../schema/appspec-v1.json

schemaVersion: 1
slug: bad-image-too-big
name: Oversized icon fixture
publisher: os8ai
icon: ./icon.png
category: dev-tools
description: Should fail because icon.png exceeds the 100 KB limit.

upstream:
  git: https://github.com/example/example.git
  ref: v1.0.0

runtime:
  kind: node
  version: "20"
  dependency_strategy: frozen

install:
  - argv: [npm, ci]

start:
  argv: [npm, start]

surface:
  kind: web

permissions:
  network:
    outbound: true
    inbound: false
  filesystem: app-private

legal:
  license: MIT

review:
  channel: verified
