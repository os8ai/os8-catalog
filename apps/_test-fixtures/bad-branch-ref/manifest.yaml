# Test fixture: upstream.ref = main (branch name) is rejected.
# yaml-language-server: $schema=../../../schema/appspec-v1.json

schemaVersion: 1
slug: bad-branch-ref
name: Branch ref (forbidden)
publisher: os8ai
icon: ./icon.png
category: dev-tools
description: Should fail because upstream.ref is a branch name, not a tag or SHA.

upstream:
  git: https://github.com/example/example.git
  ref: main

runtime:
  kind: node
  version: "20"
  dependency_strategy: frozen

install:
  - argv: [npm, ci]

start:
  argv: [npm, start]

surface:
  kind: web

permissions:
  network:
    outbound: true
    inbound: false
  filesystem: app-private

legal:
  license: MIT

review:
  channel: verified
